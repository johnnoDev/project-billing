{% extends 'billing/base.html' %}
{% block title %}Product Groups{% endblock %}
{% block content %}
<h2>Product Groups</h2>
<a href="{% url 'billing:productgroup_create' %}" class="btn btn-primary mb-3">+ New Product Group</a>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>Name</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.name }}</td>
      <td>{{ item.is_active }}</td>
      <td>
        <a href="{% url 'billing:productgroup_update' item.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'billing:productgroup_delete' item.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3" class="text-center">No records.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
