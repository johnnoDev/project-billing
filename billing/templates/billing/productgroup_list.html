{% extends 'billing/base.html' %}
{% block title %}Product Groups{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
  <h2 class="mb-0">Product Groups</h2>
  <div class="d-flex gap-2 flex-wrap">
    <a href="?export=pdf"   class="btn btn-sm btn-outline-danger"  title="Descargar PDF">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-1" viewBox="0 0 16 16"><path d="M4 0h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zm1 2v1h6V2H5zm0 3v1h6V5H5zm0 3v1h3V8H5z"/></svg>
      PDF
    </a>
    <a href="?export=excel" class="btn btn-sm btn-outline-success" title="Descargar Excel">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-1" viewBox="0 0 16 16"><path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/><path d="M8.646 6.646a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1 0 .708l-2 2a.5.5 0 0 1-.708-.708L10.293 9 8.646 7.354a.5.5 0 0 1 0-.708zm-1.292 0a.5.5 0 0 0-.708 0l-2 2a.5.5 0 0 0 0 .708l2 2a.5.5 0 0 0 .708-.708L5.707 9l1.647-1.646a.5.5 0 0 0 0-.708z"/></svg>
      Excel
    </a>
    <a href="{% url 'billing:productgroup_create' %}" class="btn btn-sm btn-primary">+ New Product Group</a>
  </div>
</div>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>Name</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.name }}</td>
      <td>{{ item.is_active }}</td>
      <td>
        <a href="{% url 'billing:productgroup_update' item.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'billing:productgroup_delete' item.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3" class="text-center">No records.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
